name: Plugin Ping Pong

# Builds the Ping Pong plugin container from plugins/ping-pong/Dockerfile and
# publishes it to the GitHub Container Registry (GHCR) at
# ghcr.io/<owner>/dweeb-ping-pong.
#
# Mirrors plugin-modal-form.yml — see the comments there for why the push
# trigger has no `paths` filter (tag pushes would be skipped) while PRs keep it.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "plugins/ping-pong/**"
      - ".github/workflows/plugin-ping-pong.yml"
  workflow_dispatch:

# `contents: read` to check out the source; `packages: write` to push to GHCR
# under the repo owner's namespace using the auto-provided GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: plugin-ping-pong-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx enables the GitHub Actions cache backend (cache-from/to: gha),
      # which persists Docker layers between runs for faster rebuilds.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR. Skipped on pull_request: forked PRs can't be
      # granted a write-scoped token, so those runs build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags/labels from the git ref. Produces :latest on the
      # default branch, :sha-<short> always, and semver tags (e.g. 0.7.0 and
      # 0.7) when a vX.Y.Z tag is pushed. The image name is lowercased for GHCR.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dweeb-ping-pong
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build context is plugins/ping-pong/, where the Dockerfile and Cargo
      # manifest live. Push only when this isn't a PR. The gha cache keeps
      # repeat builds fast.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./plugins/ping-pong
          file: ./plugins/ping-pong/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
