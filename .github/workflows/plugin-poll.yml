name: Plugin Poll

# Builds the Poll plugin container from plugins/poll/Dockerfile and publishes
# it to the GitHub Container Registry (GHCR) at ghcr.io/<owner>/dweeb-poll.
#
# Mirrors plugin-giveaway.yml but for the Poll plugin, so a plugin-only change
# doesn't rebuild the others and vice versa — the same per-target split used by
# server.yml/web.yml.
#
# Pull requests build the image to prove the Dockerfile still works but skip the
# push. Pushes to main publish :latest; pushing a vX.Y.Z tag publishes the
# matching semver tags.
#
# Note: there is intentionally no `paths` filter on the push trigger. GitHub
# evaluates path filters against tag pushes too, which routinely *skips* release
# tags that point at an already-built commit. So every main push and tag is let
# through and we lean on layer caching to keep unrelated main pushes cheap. PRs
# keep the filter — it works reliably there and that's where most runner minutes
# are spent.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "plugins/poll/**"
      - ".github/workflows/plugin-poll.yml"
  workflow_dispatch:

# `contents: read` to check out the source; `packages: write` to push to GHCR
# under the repo owner's namespace using the auto-provided GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: plugin-poll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx enables the GitHub Actions cache backend (cache-from/to: gha),
      # which persists Docker layers between runs for faster rebuilds.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR. Skipped on pull_request: forked PRs can't be
      # granted a write-scoped token, so those runs build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the git ref in plain shell rather than
      # docker/metadata-action: that action fetches repo metadata from
      # api.github.com, which intermittently fails from Actions runners (same
      # reason web.yml pins bun-version). Produces :latest on the default
      # branch, :sha-<short> always, and semver tags (e.g. 0.7.0 and 0.7) when
      # a vX.Y.Z tag is pushed. The image name is lowercased for GHCR.
      - name: Docker metadata
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dweeb-poll"
          tags="${image}:sha-${GITHUB_SHA::7}"
          case "$GITHUB_REF" in
            refs/heads/main) tags="${tags},${image}:latest" ;;
            refs/tags/v*)
              version="${GITHUB_REF#refs/tags/v}"
              tags="${tags},${image}:${version},${image}:${version%.*}"
              ;;
          esac
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      # Build context is plugins/poll/, where the Dockerfile and Cargo manifest
      # live. Push only when this isn't a PR. The gha cache keeps repeat builds
      # fast.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./plugins/poll
          file: ./plugins/poll/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          # Static OCI labels; .source keeps the GHCR package linked to the repo.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
