name: Web

# Frontend (Vite/React SPA) CI + GitHub Pages deploy. Every push to main that
# touches frontend-relevant files typechecks, builds, and publishes dist/ to
# GitHub Pages; PRs run the same verification without deploying. Server-only
# commits are handled by `server.yml`, so they skip this build entirely.
# `workflow_dispatch` lets you redeploy from the Actions tab without a commit.
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions", and set the
# custom domain (dweeb.faizo.net) there. The domain persists across deploys —
# no CNAME file is needed for Actions-based deployments.
on:
  push:
    branches: [main]
    paths: &web-paths
      - "src/**"
      - "public/**"
      # Static search pages, their content model, sitemap generation, and the
      # SEO regression audit all live outside src/. Without this path an
      # SEO-only change can pass locally yet never build or deploy.
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths: *web-paths
  workflow_dispatch:

# Minimum-needed permissions; the deploy job widens its own.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
# Saves runner minutes and gets the latest commit live faster.
concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JavaScript-based actions ahead of GitHub's June 2026
# deprecation of Node 20 on runners. Remove once Node 24 becomes the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `--frozen-lockfile` makes the install fail if `bun.lock` is out of
      # sync with `package.json`. That catches forgotten lockfile updates
      # before they reach the deploy.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Unit suite over the framework-free core: share-link serialization
      # (incl. the frozen golden-token contract), schema validation, and
      # placeholder substitution. Fast, no browser — see vitest.config.ts.
      - name: Test
        run: bun run test

      # The Vite env values are public (they're inlined into the shipped
      # bundle) but live in git-ignored .env files locally, so the runner
      # gets them from repository variables: Settings → Secrets and
      # variables → Actions → Variables. Without them the build still
      # succeeds — the guild features just stay dormant.
      - name: Build
        run: bun run build
        env:
          VITE_PROXY_BASE_URL: ${{ vars.VITE_PROXY_BASE_URL }}
          VITE_DISCORD_CLIENT_ID: ${{ vars.VITE_DISCORD_CLIENT_ID }}
          VITE_INTERACTIONS_URL: ${{ vars.VITE_INTERACTIONS_URL }}
          # Stripe publishable key for the in-app embedded Checkout. Unset → the
          # pricing modal is informational only (no in-app upgrade). Pairs with
          # the backend's STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET.
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
          # Mirror of the dispatcher's COMPONENT_TTL_DAYS — drives the exact
          # expiry figure shown to signed-out users pre-send. Unset → code
          # default 7 (the dispatcher's own default).
          VITE_COMPONENT_TTL_DAYS: ${{ vars.VITE_COMPONENT_TTL_DAYS }}

      # GitHub Pages has no rewrite rules, so serve the SPA shell as the 404
      # page — deep links (e.g. a stale `/s/<id>` short link) still load the
      # app. Doubles as a smoke test that the build produced the entry point.
      - name: Add SPA 404 fallback
        run: test -d dist/assets && cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    # The Pages publish step (actions/deploy-pages) regularly takes 5+ minutes,
    # so a 5-minute cap kept guillotining it mid-deploy and leaving prod on the
    # previous build. Match deploy-pages' own internal 10-minute timeout.
    # Leave propagation time for the best-effort, build-matched IndexNow check
    # after deploy-pages' own 10-minute publish window.
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Check out indexing notifier
        uses: actions/checkout@v4

      # Public key verification + the live post-deploy sitemap let Bing and
      # other IndexNow engines discover additions/updates immediately. Search
      # notification is best-effort and must never roll back a healthy deploy.
      - name: Notify IndexNow
        continue-on-error: true
        run: node scripts/seo/submit-indexnow.mjs
