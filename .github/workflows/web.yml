name: Web

# Frontend (Vite/React SPA) CI + GitHub Pages deploy. Every push to main that
# touches frontend-relevant files typechecks, builds, and publishes dist/ to
# GitHub Pages; PRs run the same verification without deploying. Server-only
# commits are handled by `server.yml`, so they skip this build entirely.
# `workflow_dispatch` lets you redeploy from the Actions tab without a commit.
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions", and set the
# custom domain (dweeb.faizo.net) there. The domain persists across deploys —
# no CNAME file is needed for Actions-based deployments.
on:
  push:
    branches: [main]
    paths: &web-paths
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "vite.config.ts"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths: *web-paths
  workflow_dispatch:

# Minimum-needed permissions; the deploy job widens its own.
permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
# Saves runner minutes and gets the latest commit live faster.
concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JavaScript-based actions ahead of GitHub's June 2026
# deprecation of Node 20 on runners. Remove once Node 24 becomes the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `--frozen-lockfile` makes the install fail if `bun.lock` is out of
      # sync with `package.json`. That catches forgotten lockfile updates
      # before they reach the deploy.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      # GitHub Pages has no rewrite rules, so serve the SPA shell as the 404
      # page — deep links (e.g. a stale `/s/<id>` short link) still load the
      # app. Doubles as a smoke test that the build produced the entry point.
      - name: Add SPA 404 fallback
        run: test -d dist/assets && cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
