    <!-- Charset first: the spec wants it inside the first 1024 bytes. The build
         injects its CSP/referrer metas immediately AFTER this declaration so
         header-less static mirrors and local preview still decode reliably. -->
    <meta charset="UTF-8" />

    <!-- Short-link early resolve: when this page load is a `/s/<id>` short
         link, start fetching the stored share token NOW — in parallel with the
         JS bundle download — instead of after the app boots. The app consumes
         the in-flight response via `window.__dweebShortLink` (shortlink.ts).
         `%VITE_PROXY_BASE_URL%` is replaced by Vite at build time; when it's
         unset the literal survives, fails the http check, and the app falls
         back to fetching on its own. -->
    <script>
      (function () {
        var m = /^\/s\/([0-9A-Za-z]{4,16})\/*$/.exec(location.pathname);
        var api = "%VITE_PROXY_BASE_URL%";
        if (m && /^https?:\/\//.test(api)) {
          var controller = new AbortController();
          var timeout = setTimeout(function () {
            controller.abort();
          }, 8000);
          window.__dweebShortLink = fetch(api.replace(/\/+$/, "") + "/api/shortlink/" + m[1], {
            signal: controller.signal,
          })
            .catch(function () {
              return null;
            })
            .finally(function () {
              clearTimeout(timeout);
            });
        }
      })();
    </script>

         Google resolve the parent domain to GitHub's entity and print "GitHub"

        <h1>DWEEB — Discord Components V2 Builder</h1>
        <p>
          DWEEB is a free, source-available, browser-based visual editor for crafting Discord
          Components V2 messages. Design rich webhook messages with containers, sections, buttons,
          and media, watch a pixel-accurate live preview, then export or share the result through a
          single URL. The core editor needs no account or installation.
        </p>
        <p>
          DWEEB is <strong>local by default</strong>: your working draft and browser saves stay on
          your device, while default share links keep their message data in the URL fragment.
          Optional features such as short links, schedules, server libraries, Activities, feedback,
          AI, billing, and plugins use the connected services needed to work. The Privacy Policy
          explains exactly what each feature sends and retains.
        </p>
        <h2>What you can do</h2>
        <ul>
          <li>Build messages visually with containers, sections, buttons, and media galleries.</li>
          <li>Add text displays, thumbnails, file attachments, separators, and select menus.</li>
          <li>See a pixel-accurate, Discord-style live preview as you edit.</li>
          <li>Share any message through a single URL, or export and import message JSON.</li>
          <li>Send messages straight to your Discord webhook, or edit one you already posted.</li>
          <li>
            Keep working drafts and browser saves local unless you choose a server-backed feature.
          </li>
        </ul>
        <h2>Every Components V2 component, in one editor</h2>
        <p>
          The builder supports every component a Discord webhook can send: Containers, Sections,
          Text Displays, Buttons (link, action, and premium styles), String / User / Role /
          Mentionable / Channel select menus, Thumbnails, Media Galleries, Files, and Separators. It
          enforces Discord's limits as you build and tells you when a message needs an
          application-owned webhook.
        </p>
        <h2>Frequently asked questions</h2>
        <h3>Is DWEEB free?</h3>
        <p>
          Yes — the full builder is free for noncommercial use and source-available, requires no
          account, and runs as a browser-based editor. Optional per-server Plus/Pro upgrades only
          raise quotas on extras like scheduled posts and saved messages — no feature is ever locked
          behind a plan.
        </p>
        <h3>Is DWEEB private?</h3>
        <p>
          DWEEB's core editor is local by default: working drafts, browser saves, recent webhook
          URLs, attachments, and AI keys stay on your device. Default share links keep message data
          in the URL fragment. Optional short links, schedules, server libraries, Activities,
          feedback, AI, billing, and plugins transmit or store the data required for that feature;
          see the Privacy Policy for the full inventory and retention details.
        </p>
        <h3>Do I need a Discord bot?</h3>
        <p>
          No. Any webhook URL works for posting messages with text, media, and link buttons. A bot-
          or application-owned webhook is only needed for interactive buttons and select menus that
          respond to clicks.
        </p>
        <h3>Can I edit a message I already sent?</h3>
        <p>Yes. Restore a message your webhook posted, edit it, and update it in place.</p>
        <h3>Is DWEEB open source?</h3>
        <p>
          DWEEB is source-available rather than OSI open source. The full source is on GitHub and
          it's free for noncommercial use under the PolyForm Noncommercial License 1.0.0; commercial
          use is not permitted. Read the code, file an issue, or contribute at
          <a href="https://github.com/FaizoKen/DWEEB" style="color: #00a8fc"
            >github.com/FaizoKen/DWEEB</a
          >.
        </p>
        <p>
          <strong>This app requires JavaScript.</strong> Please enable JavaScript and reload the
          page to use the editor.
        </p>

          DWEEB does more than build a message. Browse the
