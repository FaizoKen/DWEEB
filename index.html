    <!-- Short-link early resolve: when this page load is a `/s/<id>` short
         link, start fetching the stored share token NOW — in parallel with the
         JS bundle download — instead of after the app boots. The app consumes
         the in-flight response via `window.__dweebShortLink` (shortlink.ts).
         `%VITE_PROXY_BASE_URL%` is replaced by Vite at build time; when it's
         unset the literal survives, fails the http check, and the app falls
         back to fetching on its own. -->
    <script>
      (function () {
        var m = /^\/s\/([0-9A-Za-z]{4,16})\/*$/.exec(location.pathname);
        var api = "%VITE_PROXY_BASE_URL%";
        if (m && /^https?:\/\//.test(api))
          window.__dweebShortLink = fetch(api.replace(/\/+$/, "") + "/api/shortlink/" + m[1]);
      })();
    </script>

        <h1>DWEEB — Discord Webhook Embed Builder</h1>
        <p>
          DWEEB (Discord Webhook Embed Builder) is a free, source-available, browser-based visual editor for
          crafting Discord webhook messages with Components V2. Design rich messages with containers, sections,
          buttons, and media, watch a pixel-accurate live preview, then export or share the
          result through a single URL — no JSON, no backend, and no account required.
        </p>
        <p>
          DWEEB is <strong>private by design</strong>: because everything runs in your browser, your message
          drafts stay on your device and share links keep their data in the URL fragment. Nothing is
          uploaded to our servers — no account, no database — and the only data that leaves your browser is
          what you opt into sending (signing in with Discord, the AI assistant, or a plugin you
          attach). That makes it a security-conscious choice for sensitive announcements and for large
          communities and teams.
        </p>
        <h2>What you can do</h2>
        <ul>
          <li>Build messages visually with containers, sections, buttons, and media galleries.</li>
          <li>Add text displays, thumbnails, file attachments, separators, and select menus.</li>
          <li>See a pixel-accurate, Discord-style live preview as you edit.</li>
          <li>Share any message through a single URL, or export and import message JSON.</li>
          <li>Send messages straight to your Discord webhook, or edit one you already posted.</li>
          <li>Keep your drafts private — they stay in your browser and aren't uploaded to our servers.</li>
        </ul>
        <h2>Every Components V2 component, in one editor</h2>
        <p>
          The builder supports every component a Discord webhook can send: Containers, Sections,
          Text Displays, Buttons (link, action, and premium styles), String / User / Role /
          Mentionable / Channel select menus, Thumbnails, Media Galleries, Files, and Separators.
          It enforces Discord's limits as you build and tells you when a message needs an
          application-owned webhook.
        </p>
        <h2>Frequently asked questions</h2>
        <h3>Is DWEEB free?</h3>
        <p>
          Yes — it is completely free for noncommercial use and source-available, requires no account,
          and runs entirely in your browser.
        </p>
        <h3>Is DWEEB private?</h3>
        <p>
          Yes. DWEEB is private by design — it runs in your browser, so your drafts and saved data are never
          uploaded to our servers, and share links keep their data in the URL fragment. Data leaves your
          browser only when you opt into a feature that sends it — signing in with Discord, the AI assistant,
          or a plugin you attach. There's no account or database. That makes it a strong fit for
          sensitive announcements and for large communities and teams.
        </p>
        <h3>Do I need a Discord bot?</h3>
        <p>
          No. Any webhook URL works for posting messages with text, media, and link buttons. A
          bot- or application-owned webhook is only needed for interactive buttons and select menus
          that respond to clicks.
        </p>
        <h3>Can I edit a message I already sent?</h3>
        <p>
          Yes. Restore a message your webhook posted, edit it, and update it in place.
        </p>
        <h3>Is DWEEB open source?</h3>
        <p>
          DWEEB is source-available rather than OSI open source. The full source is on GitHub and it's
          free for noncommercial use under the PolyForm Noncommercial License 1.0.0; commercial use is

        </p>
