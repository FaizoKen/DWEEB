    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is DWEEB?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "DWEEB (Discord Webhook Embed Builder) is a free visual editor for designing Discord webhook messages with Components V2. You build rich messages with containers, sections, buttons and media, preview them live, then export or share them via a single URL."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to write JSON or run a backend?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The builder is fully visual and runs entirely in your browser. There is no JSON to write, no backend to host, and no account to create."
            }
          },
          {
            "@type": "Question",
            "name": "How does sharing work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your message is encoded into the URL hash fragment, so a single link reproduces the exact message. The fragment is never sent to a server, keeping your draft private."
            }
          },
          {
            "@type": "Question",
            "name": "Is DWEEB free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. It is completely free and runs entirely in your browser. There is no paywall, no sign-up, and no usage limit."
            }
          },
          {
            "@type": "Question",
            "name": "What is Discord Components V2?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Components V2 is Discord's layout system for messages. Instead of a single content field and embeds, a message is built from components such as containers, sections, text displays, buttons, select menus, media galleries, files and separators. This builder supports every component a webhook can send."
            }
          },
          {
            "@type": "Question",
            "name": "Can I add buttons and select menus to a webhook message?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. You can add link buttons to any webhook message. Interactive buttons and select menus (which carry a custom_id) only work when the webhook is owned by a Discord application or bot, because a backend must receive the click. The builder detects who owns your webhook and warns you before sending."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need a Discord bot to send the message?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Any Discord webhook URL works for posting layout, text, media and link-button messages. A bot or application-owned webhook is only required if you want interactive components (custom_id buttons or select menus) to respond to clicks."
            }
          },
          {
            "@type": "Question",
            "name": "Can I edit a Discord message I already sent?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Use Restore to pull a message your webhook previously posted back into the editor with its webhook URL and message ID, make changes, and send an update in place. Only messages the same webhook originally posted can be edited."
            }
          }
        ]
      }

      <main style="font-family: system-ui; max-width: 48rem; margin: 0 auto; padding: 2rem; color: #f2f3f5; background: #1e1f22; line-height: 1.6">
        <h1>DWEEB — Discord Webhook Embed Builder</h1>
        <p>
          DWEEB (Discord Webhook Builder) is a free, browser-based visual editor for crafting Discord
          webhook messages with Components V2. Design rich messages with containers, sections,
          buttons, and media, watch a pixel-accurate live preview, then export or share the
          result through a single URL — no JSON, no backend, and no account required.
        </p>
        <h2>What you can do</h2>
        <ul>
          <li>Build messages visually with containers, sections, buttons, and media galleries.</li>
          <li>Add text displays, thumbnails, file attachments, separators, and select menus.</li>
          <li>See a pixel-accurate, Discord-style live preview as you edit.</li>
          <li>Share any message through a single URL, or export and import message JSON.</li>
          <li>Send messages straight to your Discord webhook, or edit one you already posted.</li>
        </ul>
        <h2>Every Components V2 component, in one editor</h2>
        <p>
          The builder supports every component a Discord webhook can send: Containers, Sections,
          Text Displays, Buttons (link, action, and premium styles), String / User / Role /
          Mentionable / Channel select menus, Thumbnails, Media Galleries, Files, and Separators.
          It enforces Discord's limits as you build and tells you when a message needs an
          application-owned webhook.
        </p>
        <h2>Frequently asked questions</h2>
        <h3>Is DWEEB free?</h3>
        <p>Yes — it is completely free, requires no account, and runs entirely in your browser.</p>
        <h3>Do I need a Discord bot?</h3>
        <p>
          No. Any webhook URL works for posting messages with text, media, and link buttons. A
          bot- or application-owned webhook is only needed for interactive buttons and select menus
          that respond to clicks.
        </p>
        <h3>Can I edit a message I already sent?</h3>
        <p>
          Yes. Restore a message your webhook posted, edit it, and update it in place.
        </p>
        <p>
          <strong>This app requires JavaScript.</strong> Please enable JavaScript and reload the
          page to use the editor.
        </p>
