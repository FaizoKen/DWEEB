# Runs the proxy, the plugin services, and Caddy, which terminates TLS
# directly on this host. Point each domain's DNS STRAIGHT at this server
# (Cloudflare proxy OFF / "DNS only") — Caddy then obtains and renews the
# Let's Encrypt certificates automatically and serves HTTP/1.1, HTTP/2 and
# HTTP/3 (QUIC, port 443/udp). Only Caddy publishes host ports; everything
# else is reached over the compose network.
#
#   cp .env.example .env       # then fill it in (incl. DOMAIN + ACME_EMAIL)
#
# Run the published images (built & pushed to GHCR by the workflows):
#   docker compose pull        # grab the latest published images
#   docker compose up -d
#
# Or build from local source instead of pulling:
#   docker compose up -d --build
#
# Pin released versions instead of :latest by setting TAG / *_TAG in .env. The
# workflows strip the leading "v", so a vX.Y.Z git tag publishes X.Y.Z:
#   TAG=0.7.0
#
# ── Adding a plugin ──────────────────────────────────────────────────────────
# Plugins follow one convention (see docs/plugins.md for the protocol):
#   1. copy the modal-form service block below — new image + volume name;
#   2. copy a plugin block in ./Caddyfile — subdomain <id>.$PLUGINS_DOMAIN;
#   3. add its custom_id prefix to the dispatcher's ROUTES below;
#   4. add its manifest to src/core/plugins/registry.json (frontend).
# No DNS, CSP, or Discord-portal work: the *.$PLUGINS_DOMAIN wildcard record,
# the builder's frame-src wildcard, and the dispatcher's stable interactions
# URL already cover it.
#
# Multi-instance scaling (optional): start a shared Redis with the `redis`
# profile and point the proxy at it via REDIS_URL in .env:
#   REDIS_URL=redis://redis:6379
#   docker compose --profile redis up -d --build

# ── Shared service defaults (YAML merge anchors) ─────────────────────────────
# Merged into each service with `<<: *svc-base`. Centralises the restart policy
# and a BOUNDED json-file log driver: without a cap, container logs grow until
# they fill the VPS disk — which on a small box means an outage or a forced disk
# upsize. 10 MB × 3 files caps each service's logs at ~30 MB.
x-svc-base: &svc-base
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Merged into each Rust service's `environment` with `<<: *rust-env`. Caps
# glibc's per-thread malloc arenas at 2 so freed memory is returned to the OS
# instead of being retained in per-CPU arenas — together with the low
# TOKIO_WORKER_THREADS the binaries default to, this roughly halves idle RSS.
# Override the worker count per service with TOKIO_WORKER_THREADS to scale up.
x-rust-env: &rust-env
  MALLOC_ARENA_MAX: "2"

services:
  caddy:
    image: caddy:2-alpine
    <<: *svc-base
    ports:
      - "80:80" # ACME HTTP-01 challenge + redirect to https
      - "443:443" # HTTPS (TCP: HTTP/1.1 + HTTP/2)
      - "443:443/udp" # HTTP/3 (QUIC)
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      PLUGINS_DOMAIN: ${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates + ACME account live in /data — MUST persist, or every
      # restart re-issues certs and burns Let's Encrypt rate limits.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - proxy

  proxy:
    # Default: the image published to GHCR by .github/workflows/docker.yml.
    # Override the tag with TAG=0.7.0 in .env to pin a specific release.
    image: ghcr.io/faizoken/dweeb-proxy:${TAG:-latest}
    mem_limit: 192m
    mem_reservation: 48m
    # Local build path, used by `docker compose up -d --build`. The build is
    # tagged with the image name above, so a later plain `up` reuses it.
    build: .
    <<: *svc-base
    # The proxy's logs go to journald, overriding the json-file default from
    # svc-base: json-file logs die with the container on every CD redeploy,
    # which silently discarded the `activity_handshake` telemetry this service
    # exists to collect (and the `web_crash` reports with it). journald
    # survives container recreation, the host already caps the journal
    # (200M, see the VPS maintenance timer), and `docker logs` / Dozzle keep
    # working — the driver supports reading back. Query across deploys with:
    #   journalctl CONTAINER_NAME=dweeb-proxy-1 --since -14d \
    #     | grep activity_handshake
    logging:
      driver: journald
    env_file: .env
    environment:
      # Compose-network address of the dispatcher's permanent-slot API (the
      # token for it, DISPATCHER_API_TOKEN, comes from .env). The dashboard's
      # "keep components alive" feature flows browser → proxy → dispatcher.
      <<: *rust-env
      DISPATCHER_URL: http://dispatcher:8095
      # The short-link SQLite file must live on the proxy_data volume — a
      # short link promises 7 days, so it has to survive a redeploy.
      SHORTLINK_DB_PATH: ${SHORTLINK_DB_PATH:-/data/shortlinks.db}
      # Scheduled posts live in their OWN SQLite file on the SAME proxy_data
      # volume — a schedule is a promise to post later, so it must outlive a
      # redeploy. The webhook URL + payload are sealed at rest under
      # SESSION_SECRET and deleted once a schedule completes. A background worker
      # fires due rows on a timer. Set SCHEDULES_ENABLED=false to disable the
      # feature (the endpoints answer 501). Creating a schedule requires a Discord
      # login, and each server is capped at SCHEDULE_MAX_PER_GUILD active schedules
      # (default 5). The other SCHEDULE_*/SCHEDULER_* knobs (max entries,
      # per-webhook cap, horizon, tick, lease, batch, retention) have sensible
      # defaults — override in .env only to tune.
      SCHEDULE_DB_PATH: ${SCHEDULE_DB_PATH:-/data/schedules.db}
      # The embedded Activity's live collaboration drafts persist here (sealed at
      # rest) so a room can be reopened where it was left off, surviving a restart
      # with no peers online to re-seed it. Same proxy_data volume so it outlives a
      # redeploy; best-effort, so an unwritable path just disables resume rather
      # than failing boot. Rows are swept after ACTIVITY_DRAFT_RETENTION_DAYS.
      ACTIVITY_DRAFT_DB_PATH: ${ACTIVITY_DRAFT_DB_PATH:-/data/activity-drafts.db}
      # The per-server message library (posted messages + saved drafts, shared
      # by the web app and the embedded Activity) lives in its own SQLite file
      # on the SAME proxy_data volume — a saved message is a promise to keep it.
      # Payloads + webhook URLs are sealed at rest under SESSION_SECRET. Set
      # LIBRARY_ENABLED=false to disable (the endpoints answer 501); per-server
      # caps come from the plan tiers (or LIBRARY_MAX_PER_GUILD standalone).
      LIBRARY_DB_PATH: ${LIBRARY_DB_PATH:-/data/library.db}
      # Built-in AI (Groq relay) usage ledger — daily/monthly quota rollups.
      # Its own SQLite file on the SAME proxy_data volume: quotas that reset on
      # every redeploy aren't quotas. The whole feature is gated on GROQ_API_KEY
      # (set it in .env to turn built-in AI on; unset ⇒ the /api/ai endpoints
      # answer 501 and the FE hides the built-in provider). AI_MODEL /
      # AI_MAX_TOKENS / AI_MONTHLY_TOKEN_BUDGET and the PLAN_*_AI_* tiers are
      # tuned in .env — see .env.example.
      AI_DB_PATH: ${AI_DB_PATH:-/data/ai-usage.db}
    volumes:
      # The proxy's only state: the SQLite file with the opt-in share short
      # links (auto-expiring, default 7 days).
      - proxy_data:/data
    healthcheck:
      test: ["CMD", "/usr/local/bin/dweeb-proxy", "healthcheck"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # The Discord app's single interactions endpoint (../plugins/dispatcher):
  # verifies signatures, answers PINGs, and routes interactions to plugins by
  # custom_id prefix. Caddy serves it at https://interactions.$PLUGINS_DOMAIN
  # (plus the /interactions alias on $DOMAIN), so the URL registered in the
  # Discord portal never changes. One ROUTES entry per plugin, e.g.
  # {"modalform:": "http://modal-form:8090", "pingpong:": "http://ping-pong:8090"}
  dispatcher:
    image: ghcr.io/faizoken/dweeb-interactions-dispatcher:${DISPATCHER_TAG:-latest}
    mem_limit: 128m
    mem_reservation: 32m
    build: ../plugins/dispatcher
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      ROUTES: '{"modalform:": "http://modal-form:8090", "pingpong:": "http://ping-pong:8091", "selfrole:": "http://self-role:8092", "tickets:": "http://tickets:8093", "giveaway:": "http://giveaway:8094", "quickreplies:": "http://quick-replies:8096", "picker:": "http://picker:8097", "poll:": "http://poll:8098"}'
      # The /dashboard slash command (answered inline, no plugin) replies with
      # this URL. Register the command once: node scripts/register-commands.mjs
      # NOT derived from DOMAIN — that is the API host, not the dashboard.
      DASHBOARD_URL: ${DASHBOARD_URL:-https://dweeb.faizo.net}
      # Proxy endpoint that mints share short links — the fallback when a
      # message is too large to embed in an "Edit in DWEEB"/"Export JSON" reply.
      # Defaults to the proxy's compose address; unreachable just degrades to a
      # plain note. Same service the browser's opt-in short links use.
      SHORTLINK_API: ${SHORTLINK_API:-http://proxy:8080/api/shortlink}
      # Days a component stays clickable after its message was sent; an expired
      # click disables the component instead of reaching a plugin. 0 = forever.
      COMPONENT_TTL_DAYS: ${COMPONENT_TTL_DAYS:-7}
      # TTL-exempt messages each guild may hold, managed from the dashboard's
      # post-send dialog (via the proxy). 0 stops new grants.
      PERMANENT_SLOTS_PER_GUILD: ${PERMANENT_SLOTS_PER_GUILD:-2}
      # Custom Discord apps each guild may register (dashboard → Custom bot),
      # so the dispatcher serves THEIR app's interactions too. 0 stops new
      # registrations (existing ones keep working).
      CUSTOM_APPS_PER_GUILD: ${CUSTOM_APPS_PER_GUILD:-1}
      # Shared with every plugin: vouches for the forwarded verifying-key
      # header so plugins can verify custom-app signatures themselves.
      # Unset = custom-app clicks fail at the plugin hop.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      # Gates the /permanent + /custom-apps management APIs the proxy calls.
      # Unset = disabled.
      INTERNAL_API_TOKEN: ${DISPATCHER_API_TOKEN:-}
      RUST_LOG: info
    volumes:
      # The dispatcher's only state: the SQLite file with permanent slots.
      - dispatcher_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8095 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Plugins ────────────────────────────────────────────────────────────────

  # Modal Form (../plugins/modal-form): its own registry, config UI and config
  # API, backed by one SQLite file. Served by Caddy at modalform.$PLUGINS_DOMAIN;
  # interactions arrive via the dispatcher; publishes no host port itself.
  modal-form:
    image: ghcr.io/faizoken/dweeb-modal-form:${MODALFORM_TAG:-latest}
    mem_limit: 64m
    mem_reservation: 16m
    build: ../plugins/modal-form
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://modalform.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with instance configs.
      - modalform_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8090 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Ping Pong (../plugins/ping-pong): a button that instantly replies with a
  # configurable message. Fully stateless — the config travels inside the
  # custom_id, so there is no volume. Served at pingpong.$PLUGINS_DOMAIN.
  ping-pong:
    image: ghcr.io/faizoken/dweeb-ping-pong:${PINGPONG_TAG:-latest}
    mem_limit: 48m
    mem_reservation: 12m
    build: ../plugins/ping-pong
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://pingpong.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      RUST_LOG: info
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8091 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Self Role (../plugins/self-role): members self-assign roles from a button or
  # select. Unlike the other plugins it calls the Discord REST API, so it needs a
  # single deployment-wide bot with Manage Roles via BOT_TOKEN below — there is
  # no per-instance token; that one bot does ALL role assignment and without it
  # the config UI can't connect a server. Its own registry, config UI and config
  # API, backed by one SQLite file. Served at selfrole.$PLUGINS_DOMAIN.
  self-role:
    image: ghcr.io/faizoken/dweeb-self-role:${SELFROLE_TAG:-latest}
    mem_limit: 96m
    mem_reservation: 24m
    build: ../plugins/self-role
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://selfrole.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      # The shared bot that performs every role assignment (needs Manage Roles
      # and its role above the ones it hands out). REQUIRED in practice — if
      # blank, /api/connect answers "no Self Role bot configured" and no menu
      # can be set up. We point it at the main DWEEB bot (SELFROLE_BOT_TOKEN =
      # DISCORD_BOT_TOKEN in .env). The invite URL is optional, surfaced as a
      # one-click "add the bot (Manage Roles)" button in the config UI.
      BOT_TOKEN: ${SELFROLE_BOT_TOKEN:?set SELFROLE_BOT_TOKEN in .env (e.g. = DISCORD_BOT_TOKEN)}
      BOT_INVITE_URL: ${SELFROLE_BOT_INVITE_URL:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with instance configs.
      - selfrole_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8092 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Tickets (../plugins/tickets): members open a private support ticket from a
  # button or topic menu. Like self-role it calls the Discord REST API, so it
  # needs the same shared bot — here with MANAGE CHANNELS (create/delete the
  # ticket channel) and MANAGE ROLES (set who can see it). Point TICKETS_BOT_TOKEN
  # at the main DWEEB bot (= DISCORD_BOT_TOKEN). Its own registry, config UI and
  # config API, backed by one SQLite file (panel configs + open tickets). Served
  # at tickets.$PLUGINS_DOMAIN.
  tickets:
    image: ghcr.io/faizoken/dweeb-tickets:${TICKETS_TAG:-latest}
    mem_limit: 96m
    mem_reservation: 24m
    build: ../plugins/tickets
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://tickets.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      # The shared bot that creates/deletes ticket channels and sets their
      # overwrites (needs Manage Channels + Manage Roles). REQUIRED in practice —
      # if blank, /api/connect answers "no Tickets bot configured" and no panel
      # can be set up. We point it at the main DWEEB bot (TICKETS_BOT_TOKEN =
      # DISCORD_BOT_TOKEN in .env). The invite URL is optional, surfaced as a
      # one-click "add the bot" button in the config UI; its permissions are
      # normalized to the shared union (Manage Channels + Manage Roles).
      BOT_TOKEN: ${TICKETS_BOT_TOKEN:?set TICKETS_BOT_TOKEN in .env (e.g. = DISCORD_BOT_TOKEN)}
      BOT_INVITE_URL: ${TICKETS_BOT_INVITE_URL:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with panel configs + open tickets.
      - tickets_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8093 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Giveaway (../plugins/giveaway): members enter from a button; the live entrant
  # count rides on the button, and a host draws N winners at random when ready.
  # Unlike self-role/tickets it needs NO bot to run — entering, the count, the
  # draw and the announcement all happen over interaction responses. BOT_TOKEN is
  # OPTIONAL here, powering only the config UI's role picker (entry requirements)
  # and the "DM the winners" extra; point it at the main DWEEB bot if you want
  # those. Its own registry, config UI and config API, backed by one SQLite file
  # (giveaway configs + the per-user entry ledger). Served at giveaway.$PLUGINS_DOMAIN.
  giveaway:
    image: ghcr.io/faizoken/dweeb-giveaway:${GIVEAWAY_TAG:-latest}
    mem_limit: 80m
    mem_reservation: 20m
    build: ../plugins/giveaway
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://giveaway.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      # OPTIONAL — only for the config UI's role picker + winner DMs. Unset and
      # the core giveaway still works; role requirements just can't be set up and
      # winners aren't DMed. We point it at the main DWEEB bot when present.
      BOT_TOKEN: ${GIVEAWAY_BOT_TOKEN:-}
      BOT_INVITE_URL: ${GIVEAWAY_BOT_INVITE_URL:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with giveaway configs + entries.
      - giveaway_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8094 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Quick Replies (../plugins/quick-replies): attach canned replies to a button
  # or topic menu — each click/option sends text, links and {user}/{server}
  # variables, privately or publicly, with optional role-gating. The cheapest
  # plugin to host: a click is answered straight from the interaction, so there
  # is NO REST call on the hot path. BOT_TOKEN is OPTIONAL and powers ONLY the
  # config UI's role-gate picker (listing a guild's roles); unset and the core
  # still works, role-gating just can't be set up. Its own registry, config UI
  # and config API, backed by one SQLite file. Served at quickreplies.$PLUGINS_DOMAIN.
  quick-replies:
    image: ghcr.io/faizoken/dweeb-quick-replies:${QUICKREPLIES_TAG:-latest}
    mem_limit: 64m
    mem_reservation: 16m
    build: ../plugins/quick-replies
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://quickreplies.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      # OPTIONAL — only for the config UI's role-gate picker. Unset and the core
      # plugin still works; role-gating just can't be set up. We point it at the
      # main DWEEB bot when present.
      BOT_TOKEN: ${QUICKREPLIES_BOT_TOKEN:-}
      BOT_INVITE_URL: ${QUICKREPLIES_BOT_INVITE_URL:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with menu configs.
      - quickreplies_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8096 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Picker (../plugins/picker): attach to one of Discord's auto-populated selects
  # — User / Role / Mentionable / Channel — and a member's picks come back as
  # mentions in a private confirmation or a public announcement that can ping
  # them. The lightest plugin in the set: a pick is answered straight from the
  # interaction payload, so there is NO REST call and NO bot token at all. Its
  # own registry, config UI and config API, backed by one SQLite file. Served at
  # picker.$PLUGINS_DOMAIN.
  picker:
    image: ghcr.io/faizoken/dweeb-picker:${PICKER_TAG:-latest}
    mem_limit: 64m
    mem_reservation: 16m
    build: ../plugins/picker
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://picker.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with menu configs.
      - picker_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8097 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Poll (../plugins/poll): members vote from a button or select menu — live
  # tallies restamp on the message itself, ballots are one-per-member
  # (changeable or locked), results can hide until close, and a host closes
  # with a public results announcement. Like giveaway it needs NO bot to run —
  # voting, tallies, close and the announcement all happen over interaction
  # responses. BOT_TOKEN is OPTIONAL here, powering only the config UI's role
  # picker (vote gates + host roles); point it at the main DWEEB bot if you
  # want that. Its own registry, config UI and config API, backed by one SQLite
  # file (poll configs + the per-member ballot ledger + tallies). Served at
  # poll.$PLUGINS_DOMAIN.
  poll:
    image: ghcr.io/faizoken/dweeb-poll:${POLL_TAG:-latest}
    mem_limit: 64m
    mem_reservation: 16m
    build: ../plugins/poll
    <<: *svc-base
    environment:
      <<: *rust-env
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?set DISCORD_PUBLIC_KEY in .env}
      PUBLIC_BASE_URL: https://poll.${PLUGINS_DOMAIN:?set PLUGINS_DOMAIN in .env}
      # Lets the dispatcher vouch for a custom app's verifying key (see the
      # dispatcher service above). Must match the dispatcher's value.
      DISPATCHER_FORWARD_SECRET: ${DISPATCHER_FORWARD_SECRET:-}
      # OPTIONAL — only for the config UI's role picker. Unset and the core
      # poll still works; role gates just can't be set up. We point it at the
      # main DWEEB bot when present.
      BOT_TOKEN: ${POLL_BOT_TOKEN:-}
      BOT_INVITE_URL: ${POLL_BOT_INVITE_URL:-}
      RUST_LOG: info
    volumes:
      # The plugin's only state: the SQLite file with poll configs + ballots.
      - poll_data:/data
    healthcheck:
      # The image has no curl/wget; bash's /dev/tcp does the probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8098 && printf 'GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Only started when you opt in with `--profile redis`. Shared cache +
  # rate-limit store for running several `proxy` replicas behind a balancer.
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    <<: *svc-base
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Not published to the host — only the proxy talks to it over the compose
    # network. Add a `ports:` mapping only if you need to inspect it directly.

  # ── Monitoring ───────────────────────────────────────────────────────────────
  # Three lightweight, self-hosted pillars (first-run setup: ./MONITORING.md):
  #   • Beszel  — host + per-container metrics (CPU/mem/disk/net) with alerts
  #   • Gatus   — synthetic uptime checks of the PUBLIC endpoints, config-as-code
  #   • Dozzle  — live container logs (localhost-only; reach it over an SSH tunnel)
  # Beszel's and Gatus's web UIs sit behind Caddy at *.$PLUGINS_DOMAIN (same
  # wildcard cert as the plugins, so no DNS work). The whole section is optional:
  # leave the .env values blank and the core stack runs exactly as before — the
  # monitoring containers just idle until configured, and nothing here can take
  # the proxy/dispatcher down (Caddy only gains plain reverse_proxy blocks).

  # Beszel hub: stores the metrics and serves the dashboard (its OWN login).
  # Caddy publishes it at https://beszel.$PLUGINS_DOMAIN; the 127.0.0.1:8090
  # publish exists only so the host-networked agent below can dial back in — it
  # is NOT reachable from the public internet.
  beszel:
    image: henrygd/beszel:latest
    <<: *svc-base
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - beszel_data:/beszel_data

  # Beszel agent: reads true host metrics (needs host networking) plus per-
  # container Docker stats (read-only socket) and pushes them to the hub. The
  # agent REFUSES to start without a KEY, so it sits behind a compose profile —
  # plain `up -d` (incl. the CD forced-command) never starts it, so it can't
  # crash-loop before it is configured. First run: create the hub admin, copy
  # KEY (Add System → Docker) + TOKEN (Settings → Tokens) into .env, then:
  #   docker compose --profile beszel-agent up -d beszel-agent
  # LISTEN binds 45876 on the host but the firewall only opens 80/443.
  beszel-agent:
    image: henrygd/beszel-agent:latest
    profiles: ["beszel-agent"]
    <<: *svc-base
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_agent_data:/var/lib/beszel-agent
    environment:
      LISTEN: 45876
      HUB_URL: http://localhost:8090
      TOKEN: ${BESZEL_TOKEN:-}
      KEY: ${BESZEL_KEY:-}

  # Gatus: pings the public endpoints on a schedule and alerts Discord on
  # failure. Endpoints AND alert rules are declared in ./gatus/config.yaml; the
  # env vars below are substituted into it. Served at https://status.$PLUGINS_DOMAIN.
  gatus:
    image: twinproduction/gatus:latest
    <<: *svc-base
    volumes:
      - ./gatus/config.yaml:/config/config.yaml:ro
      - gatus_data:/data
    environment:
      DOMAIN: ${DOMAIN:-}
      PLUGINS_DOMAIN: ${PLUGINS_DOMAIN:-}
      MONITORING_DISCORD_WEBHOOK: ${MONITORING_DISCORD_WEBHOOK:-}

  # Dozzle: live, searchable container logs in the browser. Deliberately NOT
  # fronted by Caddy — raw logs do not belong on the public internet — so it
  # binds to localhost only. Reach it over an SSH tunnel:
  #   ssh -L 8080:localhost:8081 contabo   # then open http://localhost:8080
  dozzle:
    image: amir20/dozzle:latest
    <<: *svc-base
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"

volumes:
  caddy_data:
  caddy_config:
  proxy_data:
  dispatcher_data:
  modalform_data:
  selfrole_data:
  tickets_data:
  giveaway_data:
  quickreplies_data:
  picker_data:
  poll_data:
  beszel_data:
  beszel_agent_data:
  gatus_data:
