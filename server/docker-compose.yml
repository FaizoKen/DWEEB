# Runs the proxy. Cloudflare Tunnel is installed on the host, so there is no
# cloudflared container here. The proxy is published on the LOOPBACK address
# only (127.0.0.1) — not reachable from the public internet, only by the host
# (where cloudflared runs) and other local processes.
#
# Point your tunnel's ingress at  http://localhost:8080  (see README).
#
#   cp .env.example .env       # then fill it in
#
# Run the published image (built & pushed to GHCR by the Docker workflow):
#   docker compose pull        # grab the latest published image
#   docker compose up -d
#
# Or build from local source instead of pulling:
#   docker compose up -d --build
#
# Pin a released version instead of :latest by setting TAG in .env. The Docker
# workflow strips the leading "v", so a vX.Y.Z git tag publishes X.Y.Z:
#   TAG=0.7.0
#
# Multi-instance scaling (optional): start a shared Redis with the `redis`
# profile and point the proxy at it via REDIS_URL in .env:
#   REDIS_URL=redis://redis:6379
#   docker compose --profile redis up -d --build

services:
  proxy:
    # Default: the image published to GHCR by .github/workflows/docker.yml.
    # Override the tag with TAG=0.7.0 in .env to pin a specific release.
    image: ghcr.io/faizoken/dweeb-proxy:${TAG:-latest}
    # Local build path, used by `docker compose up -d --build`. The build is
    # tagged with the image name above, so a later plain `up` reuses it.
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/dweeb-proxy", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Only started when you opt in with `--profile redis`. Shared cache +
  # rate-limit store for running several `proxy` replicas behind a balancer.
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Not published to the host — only the proxy talks to it over the compose
    # network. Add a `ports:` mapping only if you need to inspect it directly.
